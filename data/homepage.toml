desc = """Beginning in 2022, he assumed the role of Advisor for Direct Entry Students in the Department of Computer Science and Engineering at HKUST. In the past, he has served as an Advisor for numerous student interest groups. In 2013, he received a certificate of Mental Health First Aid Standard Course for Staff. This formal training enables him to provide support to students, especially for students with special educational needs (SEN).
"""

[[tags]]
