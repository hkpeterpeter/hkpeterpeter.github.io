<!-- // Bootstrap 5 carosel -->

<div id="carouselSlideShow" class="carousel slide" data-bs-ride="carousel">

    <div class="carousel-inner">

        {{ range $index, $element := .Site.Data.slideshow.slide }}
        <div class="carousel-item {{if eq $index 0}} active {{end}}">
            <img class="d-block w-100" src="{{$element.url}}" alt="slide {{add $index 1}}">

            <div class="carousel-caption d-none d-md-block" style="background-color:rgba(0, 0, 0, 0.5);">

                <h5>{{$element.title}} </h5>

                {{ with $element.subtitle }}
                <p>
                    {{.}}
                </p>
                {{ end}}

                <p>
                {{ with $element.tags }}
                    {{ range sort . }}
                    <span class="badge bg-warning text-dark"> {{.}}</span>

                    {{ end }}
                {{ end }}
                </p>
            </div>
        </div>
        {{ end }}

    </div>
    <a class="carousel-control-prev" href="#carouselSlideShow" role="button" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </a>
      <a class="carousel-control-next" href="#carouselSlideShow" role="button" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </a>
</div>
<!-- // Bootstrap 5 carosel -->
