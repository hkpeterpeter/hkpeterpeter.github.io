
{{ if isset .Site.Taxonomies "tags" }}
{{ if not (eq (len .Site.Taxonomies.tags) 0) }}

    <h3>Tags</h3>
    <div class="p-3">

            {{ range $name, $items := .Site.Taxonomies.tags }}

        <a href="{{ $.Site.BaseURL }}tags/{{ $name | urlize | lower }}"
           class="btn btn-sm btn-outline-secondary mb-2 text-left" role="button" aria-pressed="true">
            <i class="fas fa-tag"></i> {{ $name }}
            <span class="badge bg-secondary text-white">{{len  $items.Pages}}</span></a>

            {{ end }}

    </div>

{{ end }}
{{ end }}
